<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>opchain — Skill Library</title>
  <meta name="description" content="Every opchain skill, filterable by pipeline phase. Download individual SKILL.md files or the complete bundle." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-header-brand" href="/" aria-label="opchain home">
        <svg width="28" height="28" viewBox="0 0 32 32" aria-hidden="true">
          <line x1="3" y1="16" x2="29" y2="16" stroke="#5a5040" stroke-width="1"/>
          <rect x="3" y="10" width="7" height="12" rx="1.5" fill="none" stroke="#e8dfd0" stroke-width="1.2"/>
          <rect x="12" y="10" width="7" height="12" rx="1.5" fill="none" stroke="#e8dfd0" stroke-width="1.2"/>
          <rect x="21" y="10" width="8" height="12" rx="1.5" fill="#e05c18"/>
          <circle cx="6.5" cy="16" r="1.6" fill="#e8dfd0"/>
          <circle cx="15.5" cy="16" r="1.6" fill="#e8dfd0"/>
          <circle cx="25" cy="16" r="1.6" fill="#1c1710"/>
        </svg>
        <span class="logo">opchain</span>
      </a>
      <nav class="nav-scroll" aria-label="Primary">
        <div class="nav">
          <a href="/">Introduction</a>
          <a href="/architecture.html">Architecture</a>
          <a href="/skills.html" class="active">Skill Library</a>
          <a href="/install.html">Install</a>
          <a href="/tryit.html">Try It</a>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <div class="page-head">
      <div>
        <div class="eyebrow">skill library</div>
        <h1>Every skill, filterable.</h1>
      </div>
      <a class="btn-outline" href="/opchain-skills.zip" download>download all skills</a>
    </div>

    <section class="library-panel" aria-labelledby="lib-heading">
      <h2 id="lib-heading" class="visually-hidden">Filters</h2>
      <div class="search-row">
        <label for="skill-search" class="visually-hidden">Search skills</label>
        <input id="skill-search" type="search" placeholder="search skills…" autocomplete="off" />
      </div>

      <div class="phase-field">
        <label for="phase-select">Pipeline phase</label>
        <select id="phase-select" class="phase-select" aria-label="Filter by pipeline phase"></select>
      </div>

      <div id="phase-pills" class="phase-pills" role="group" aria-label="Filter by pipeline phase"></div>

      <div class="tri-row">
        <input type="checkbox" id="tri-only" />
        <label for="tri-only">Tri-agent only</label>
      </div>

      <p id="skill-count" class="meta" aria-live="polite"></p>
    </section>

    <div id="skill-list" class="skill-list"></div>
  </main>

  <script src="/skills.js"></script>
  <script src="/skills-app.js"></script>
</body>
</html>
