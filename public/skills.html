<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>opchain — Skill Library</title>
  <meta name="description" content="Every opchain skill, filterable by pipeline phase. Download individual SKILL.md files or the complete bundle." />
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('opchain-theme');
        if (saved === 'light' || saved === 'dark') {
          document.documentElement.setAttribute('data-theme', saved);
          return;
        }
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      } catch (e) {}
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-header-brand" href="/" aria-label="opchain home">
        <svg width="28" height="28" viewBox="0 0 32 32" aria-hidden="true">
          <line x1="3" y1="16" x2="29" y2="16" stroke="var(--logo-spine, #5a5040)" stroke-width="1"/>
          <rect x="3" y="10" width="7" height="12" rx="1.5" fill="none" stroke="var(--logo-stroke, #e8dfd0)" stroke-width="1.2"/>
          <rect x="12" y="10" width="7" height="12" rx="1.5" fill="none" stroke="var(--logo-stroke, #e8dfd0)" stroke-width="1.2"/>
          <rect x="21" y="10" width="8" height="12" rx="1.5" fill="var(--logo-filled, #e05c18)"/>
          <circle cx="6.5" cy="16" r="1.6" fill="var(--logo-stroke, #e8dfd0)"/>
          <circle cx="15.5" cy="16" r="1.6" fill="var(--logo-stroke, #e8dfd0)"/>
          <circle cx="25" cy="16" r="1.6" fill="var(--logo-dot-dark, #1c1710)"/>
        </svg>
        <span class="logo">opchain</span>
      </a>
      <nav class="nav-scroll" aria-label="Primary">
        <div class="nav">
          <a href="/">Introduction</a>
          <a href="/architecture.html">Architecture</a>
          <a href="/skills.html" class="active">Skill Library</a>
          <a href="/install.html">Install</a>
          <a href="/tryit.html">Try It</a>
        </div>
      </nav>
      <button class="theme-toggle" type="button" aria-label="Switch to light theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <div class="page-head">
      <div>
        <div class="eyebrow">skill library</div>
        <h1>Every skill, filterable.</h1>
      </div>
      <a class="btn-outline" href="/opchain-skills.zip" download>download all skills</a>
    </div>

    <section class="library-panel" aria-labelledby="lib-heading">
      <h2 id="lib-heading" class="visually-hidden">Filters</h2>
      <div class="search-row">
        <label for="skill-search" class="visually-hidden">Search skills</label>
        <input id="skill-search" type="search" placeholder="search skills…" autocomplete="off" />
      </div>

      <div class="phase-field">
        <label for="phase-select">Pipeline phase</label>
        <select id="phase-select" class="phase-select" aria-label="Filter by pipeline phase"></select>
      </div>

      <div id="phase-pills" class="phase-pills" role="group" aria-label="Filter by pipeline phase"></div>

      <div class="tri-row">
        <input type="checkbox" id="tri-only" />
        <label for="tri-only">Tri-agent only</label>
      </div>

      <p id="skill-count" class="meta" aria-live="polite"></p>
    </section>

    <div id="skill-list" class="skill-list"></div>
  </main>

  <script src="/skills.js"></script>
  <script src="/skills-app.js"></script>
  <script src="/theme-toggle.js" defer></script>
</body>
</html>
