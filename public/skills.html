<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>opchain — Skill Library</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <div class="logo">opchain</div>
      <nav class="nav-scroll" aria-label="Primary">
        <div class="nav">
          <a href="/">Introduction</a>
          <a href="/architecture.html">Architecture</a>
          <a href="/skills.html" class="active">Skill Library</a>
          <a href="/install.html">Install</a>
          <a href="/tryit.html">Try It</a>
        </div>
      </nav>
    </div>
  </header>
  <main>
    <div class="page-head">
      <h1>Skill Library</h1>
      <a class="btn-outline" href="/opchain-skills.zip" download>Download all skills</a>
    </div>

    <section class="library-panel" aria-labelledby="lib-heading">
      <h2 id="lib-heading" class="visually-hidden">Filters</h2>
      <div class="search-row">
        <label for="skill-search" class="visually-hidden">Search skills</label>
        <input id="skill-search" type="search" placeholder="Search skills…" autocomplete="off" />
      </div>

      <div class="phase-field">
        <label for="phase-select">Pipeline phase</label>
        <select id="phase-select" class="phase-select" aria-label="Filter by pipeline phase"></select>
      </div>

      <div id="phase-pills" class="phase-pills" role="group" aria-label="Filter by pipeline phase"></div>

      <div class="tri-row">
        <input type="checkbox" id="tri-only" />
        <label for="tri-only">Tri-agent only</label>
      </div>

      <p id="skill-count" class="meta" aria-live="polite"></p>
    </section>

    <div id="skill-list" class="skill-list"></div>
  </main>

  <script src="/skills.js"></script>
  <script src="/skills-app.js"></script>
</body>
</html>
