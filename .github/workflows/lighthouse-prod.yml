name: Lighthouse — production

# Notification-only LHCI run against the live site. Triggered on a daily cron
# and on demand via workflow_dispatch. Does not block any deploy — by the time
# this runs, opchain.dev is already serving the build under test, so a regression
# here is a signal to investigate, not an emergency CI failure. Surfaces scores
# in the run's GITHUB_STEP_SUMMARY (and the temporary-public-storage upload).
#
# Backlog: roadmap/05-post-sprint-7-backlog.md B-07.

on:
  schedule:
    # 07:17 UTC daily — off-peak for our user base. Odd minute to avoid the
    # GitHub-Actions queue spike at :00.
    - cron: "17 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse-prod
  cancel-in-progress: false

jobs:
  lhci-prod:
    name: LHCI — production (opchain.dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install (site)
        working-directory: site
        run: npm ci
      - name: Run LHCI against production
        working-directory: site
        run: npx --no -- lhci autorun --config=../lighthouserc.prod.cjs

      - name: Surface LHCI summary in step summary
        if: always()
        env:
          LHCI_DIR: site/.lighthouseci
        run: |
          if [ ! -d "$LHCI_DIR" ]; then
            echo "no .lighthouseci directory — autorun likely never reached collect" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          node -e "const {buildComment}=require('./scripts/lhci-comment.cjs');process.stdout.write(buildComment(process.env.LHCI_DIR));" >> "$GITHUB_STEP_SUMMARY"
