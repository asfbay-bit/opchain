name: Checkpoint after merge

# Auto-stamp the oc-git-ops checkpoint whenever a PR merges to main, so the
# session-state docs at .checkpoints/<skill>.checkpoint.json keep up
# without anyone remembering to do it by hand.
#
# What this does:
#   1. Runs only when a PR is closed AND it merged.
#   2. Reads the merged PR's title, number, and merge SHA.
#   3. Calls `node scripts/checkpoint.mjs update oc-git-ops` to:
#        - append the merged PR to skill_state.merged_prs
#        - re-stamp updated_at (the script does this automatically)
#   4. Opens a stamp PR against main and flips on auto-merge so it lands
#      with no human in the loop the moment required checks pass.
#
# Why a PR instead of a direct push: the v1 of this workflow tried to
# push the stamp commit straight to main with the default GITHUB_TOKEN,
# which fails on any repo with branch protection (this one) — `main`
# requires PR review for any push. Opening a PR sidesteps the protection
# and gives reviewers a record of the bot's edits.
#
# Other skills (oc-orchestrator, oc-app-architect, oc-ux-engineer, …) are NOT
# auto-updated here — their content is contextual and the assistant
# updates them at sensible inflection points via
# `node scripts/checkpoint.mjs update <skill>`. Only oc-git-ops has a
# deterministic post-merge update worth automating.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  stamp-oc-git-ops:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      PR_NUM: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_SHA: ${{ github.event.pull_request.merge_commit_sha }}
      # Skip the recursive case: when this workflow's own stamp PR
      # merges, the merge fires this same event again. The branch-name
      # check below short-circuits before any work happens.
      INCOMING_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - name: Skip if this run was triggered by our own stamp PR
        id: gate
        run: |
          if [[ "$INCOMING_BRANCH" == bot/checkpoint-stamp-* ]]; then
            echo "Stamp PR merge — skipping to avoid infinite loop."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Append merged PR to oc-git-ops checkpoint
        if: steps.gate.outputs.skip != 'true'
        run: |
          # Build the merged_prs entry as compact JSON. The :json suffix
          # on --skill_state.merged_prs+ tells the CLI to parse the value.
          ENTRY=$(node -e '
            const e = {
              number: parseInt(process.env.PR_NUM, 10),
              title: process.env.PR_TITLE,
              merge_method: "squash",
              merge_sha: (process.env.PR_SHA || "").slice(0, 7),
              merged_at: new Date().toISOString(),
            };
            process.stdout.write(JSON.stringify(e));
          ')
          node scripts/checkpoint.mjs update oc-git-ops \
            "--skill_state.merged_prs+:json=$ENTRY" \
            "--step=last-merge-#${PR_NUM}" \
            "--status=complete"

      - name: Open stamp PR (or skip if no diff)
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- .checkpoints/; then
            echo "No checkpoint change to commit."
            exit 0
          fi

          BRANCH="bot/checkpoint-stamp-${PR_NUM}"
          git config user.name  "opchain-bot"
          git config user.email "bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .checkpoints/oc-git-ops.checkpoint.json
          git commit -m "chore(checkpoint): stamp oc-git-ops after #${PR_NUM} merge"
          git push origin "$BRANCH"

          # Create the PR. If one already exists for the same branch
          # (rare, but possible on retries), gh exits non-zero — swallow
          # so the workflow stays green.
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(checkpoint): stamp oc-git-ops after #${PR_NUM} merge" \
            --body "Auto-generated by [.github/workflows/checkpoint-after-merge.yml](https://github.com/${{ github.repository }}/blob/main/.github/workflows/checkpoint-after-merge.yml). Appends #${PR_NUM} to \`.checkpoints/oc-git-ops.checkpoint.json\` so \`npm run checkpoint:status\` keeps up.

          Closes the loop on the [tracked-checkpoint protocol](https://github.com/${{ github.repository }}/blob/main/.checkpoints/README.md). Safe to merge as soon as required checks pass." \
            || echo "PR already exists or could not be created."

          # Auto-merge as soon as required checks pass. Falls back to a
          # manual merge if auto-merge isn't enabled at the repo level.
          gh pr merge "$BRANCH" --auto --squash --delete-branch || echo "Auto-merge not available — leaving the PR open."
