name: Deploy to staging

# Every push to main lands on staging.opchain.dev. Production deploys go
# through .github/workflows/promote.yml after a human verifies the staging
# build. Use workflow_dispatch to re-run a staging deploy without a push.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      # Keep the custom domain here for the GitHub UI link. The smoke test below
      # does not depend on it — it uses the deployment-url output from wrangler.
      url: https://staging.opchain.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install (site)
        working-directory: site
        run: npm ci
      - name: Build
        env:
          OPCHAIN_VERSION: ${{ github.sha }}
          PUBLIC_CF_BEACON_TOKEN: ${{ secrets.PUBLIC_CF_BEACON_TOKEN }}
          PUBLIC_POSTHOG_KEY: ${{ secrets.PUBLIC_POSTHOG_KEY }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}
        run: npm run build
      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging
      - name: Smoke — health + homepage + zip + security headers
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url || 'https://staging.opchain.dev' }}
        run: ./scripts/smoke.sh
