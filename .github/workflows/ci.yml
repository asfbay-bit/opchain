name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worker:
    name: Worker — build, test, catalog verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install (root)
        run: npm ci
      - name: Install (site) — needed because `npm run build` now runs astro build
        working-directory: site
        run: npm ci
      - name: Unit tests
        run: npm test
      - name: Build worker (regenerates catalog, builds site, bundles worker)
        env:
          OPCHAIN_VERSION: ${{ github.sha }}
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: worker-dist
          path: dist/
          retention-days: 7

  site:
    name: Site — install, type-check, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install
        working-directory: site
        run: npm ci
      - name: Astro check (type + content validation)
        working-directory: site
        run: npm run check
      - name: Build
        working-directory: site
        run: npm run build
