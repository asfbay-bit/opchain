name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  worker:
    name: Worker — build, test, catalog verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - name: Install (root)
        run: npm ci
      - name: Install (site) — needed because `npm run build` now runs astro build
        working-directory: site
        run: npm ci
      - name: Validate checkpoints (.checkpoints/<skill>.checkpoint.json)
        run: npm run checkpoint:validate
      - name: Bundled skill references in sync with sources (fast-fail)
        # Also enforced transitively by pretest/prebuild; this is an explicit,
        # early signal so a source edit without a re-sync fails loudly.
        run: npm run sync-bundles:check
      - name: Verify .claude/skills/ has no drift from skills/
        run: |
          # Each .claude/skills/<name> must be a symlink to ../../skills/<name>.
          # Tracking copies leads to stale runtime instructions (audit PR #157).
          fail=0
          for entry in .claude/skills/*; do
            name=$(basename "$entry")
            if [[ ! -L "$entry" ]]; then
              echo "::error file=$entry::not a symlink — .claude/skills/$name must symlink to ../../skills/$name"
              fail=1
              continue
            fi
            target=$(readlink "$entry")
            expected="../../skills/$name"
            if [[ "$target" != "$expected" ]]; then
              echo "::error file=$entry::symlink points to '$target', expected '$expected'"
              fail=1
            fi
          done
          for d in skills/*/; do
            name=$(basename "$d")
            if [[ ! -e ".claude/skills/$name" ]]; then
              echo "::error file=skills/$name::no .claude/skills/$name symlink — runtime won't see this skill"
              fail=1
            fi
          done
          if [[ $fail -ne 0 ]]; then exit 1; fi
          echo "✓ .claude/skills/ ↔ skills/ symlinks are clean"
      - name: Unit tests
        run: npm test
      - name: Build worker (regenerates catalog, builds site, bundles worker)
        env:
          OPCHAIN_VERSION: ${{ github.sha }}
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: worker-dist
          path: dist/
          retention-days: 7

  site:
    name: Site — install, type-check, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install
        working-directory: site
        run: npm ci
      - name: Astro check (type + content validation)
        working-directory: site
        run: npm run check
      - name: Build
        working-directory: site
        run: npm run build

  site-e2e:
    name: Site — Playwright e2e
    runs-on: ubuntu-latest
    needs: site
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install (site)
        working-directory: site
        run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('site/package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: site
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: site
        run: npx playwright install-deps chromium
      - name: Build (static)
        working-directory: site
        env:
          PUBLIC_POSTHOG_KEY: phc_test_e2e
          PUBLIC_POSTHOG_HOST: http://127.0.0.1:9999
        run: npm run build
      - name: Run Playwright tests
        working-directory: site
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: site/playwright-report/
          retention-days: 7

      - name: Post axe violation summary as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          AXE_RESULTS_DIR: site/test-results
        with:
          script: |
            const path = require('path');
            const { buildComment } = require(
              path.resolve(process.env.GITHUB_WORKSPACE, 'scripts/axe-comment.cjs')
            );
            const body = buildComment(process.env.AXE_RESULTS_DIR);
            if (body == null) {
              console.log('axe: nothing to report (suite green or no attachments) — skipping comment');
              return;
            }
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
