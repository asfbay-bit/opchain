name: Lighthouse

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lhci:
    name: LHCI — perf, a11y, best-practices, SEO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install (site)
        working-directory: site
        run: npm ci
      - name: Build site
        working-directory: site
        env:
          # Match the production build: PostHog public key baked, beacon token absent
          # so CF Web Analytics doesn't try to load. Keeping these out of the LHCI run
          # avoids third-party network noise during scoring.
          PUBLIC_POSTHOG_KEY: ""
        run: npm run build
      - name: Run LHCI
        working-directory: site
        run: npx --no -- lhci autorun --config=../lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Post LHCI score summary as PR comment
        if: always() && github.event_name == 'pull_request'
        working-directory: site
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ ! -f .lighthouseci/manifest.json ]; then
            echo "no LHCI manifest — collect step likely failed"
            exit 0
          fi
          node ../scripts/lhci-summary.mjs .lighthouseci/manifest.json > /tmp/lhci-comment.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/lhci-comment.md
