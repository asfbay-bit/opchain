name: Lighthouse

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lhci:
    name: LHCI — perf, a11y, best-practices, SEO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install (site)
        working-directory: site
        run: npm ci
      - name: Build site
        working-directory: site
        env:
          # Match the production build: PostHog public key baked, beacon token absent
          # so CF Web Analytics doesn't try to load. Keeping these out of the LHCI run
          # avoids third-party network noise during scoring.
          PUBLIC_POSTHOG_KEY: ""
        run: npm run build
      - name: Run LHCI
        working-directory: site
        run: npx --no -- lhci autorun --config=../lighthouserc.cjs
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Post LHCI score summary as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          LHCI_DIR: site/.lighthouseci
        with:
          script: |
            const path = require('path');
            const { buildComment } = require(
              path.resolve(process.env.GITHUB_WORKSPACE, 'scripts/lhci-comment.cjs')
            );
            const body = buildComment(process.env.LHCI_DIR);
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
