name: Lighthouse

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lhci:
    name: LHCI — perf, a11y, best-practices, SEO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install (site)
        working-directory: site
        run: npm ci
      - name: Build site
        working-directory: site
        env:
          # Match the production build: PostHog public key baked, beacon token absent
          # so CF Web Analytics doesn't try to load. Keeping these out of the LHCI run
          # avoids third-party network noise during scoring.
          PUBLIC_POSTHOG_KEY: ""
        run: npm run build
      - name: Run LHCI
        working-directory: site
        run: npx --no -- lhci autorun --config=../lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Post LHCI score summary as PR comment
        if: always() && github.event_name == 'pull_request'
        working-directory: site
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ ! -f .lighthouseci/manifest.json ]; then
            echo "no LHCI manifest — collect step likely failed"
            exit 0
          fi
          node <<'NODE' > /tmp/lhci-comment.md
          const m = require('./.lighthouseci/manifest.json');
          const byUrl = {};
          for (const r of m) (byUrl[r.url] ||= []).push(r.summary);
          const cats = ['performance','accessibility','best-practices','seo'];
          const median = a => [...a].sort((x,y)=>x-y)[Math.floor(a.length/2)];
          const fmt = n => n.toFixed(2);
          const runs = m.length / Object.keys(byUrl).length;
          let out = `## LHCI scores (median of ${runs} runs)\n\n`;
          out += '| Route | Perf | A11y | Best | SEO |\n|---|---|---|---|---|\n';
          for (const url in byUrl) {
            const path = new URL(url).pathname || '/';
            const row = cats.map(c => fmt(median(byUrl[url].map(r=>r[c]))));
            out += `| \`${path}\` | ${row.join(' | ')} |\n`;
          }
          process.stdout.write(out);
          NODE
          gh pr comment "$PR_NUMBER" --body-file /tmp/lhci-comment.md
