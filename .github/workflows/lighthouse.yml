name: Lighthouse

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lhci:
    name: LHCI — perf, a11y, best-practices, SEO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install (site)
        working-directory: site
        run: npm ci
      - name: Build site
        working-directory: site
        env:
          # Match the production build: PostHog public key baked, beacon token absent
          # so CF Web Analytics doesn't try to load. Keeping these out of the LHCI run
          # avoids third-party network noise during scoring.
          PUBLIC_POSTHOG_KEY: ""
        run: npm run build
      - name: Run LHCI
        working-directory: site
        run: npx --no -- lhci autorun --config=../lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Post LHCI score summary as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          MANIFEST_PATH: site/.lighthouseci/manifest.json
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const manifestPath = process.env.MANIFEST_PATH;
            const dir = path.dirname(manifestPath);

            let body;
            if (fs.existsSync(manifestPath)) {
              const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
              const byUrl = {};
              for (const r of manifest) (byUrl[r.url] ??= []).push(r.summary);
              const cats = ['performance', 'accessibility', 'best-practices', 'seo'];
              const median = (a) => [...a].sort((x, y) => x - y)[Math.floor(a.length / 2)];
              const runs = manifest.length / Object.keys(byUrl).length;
              body = `## LHCI scores (median of ${runs} run${runs === 1 ? '' : 's'})\n\n`;
              body += '| Route | Perf | A11y | Best | SEO |\n|---|---|---|---|---|\n';
              for (const url of Object.keys(byUrl)) {
                const p = new URL(url).pathname || '/';
                const row = cats.map((c) => median(byUrl[url].map((s) => s[c])).toFixed(2));
                body += `| \`${p}\` | ${row.join(' | ')} |\n`;
              }
            } else {
              const files = fs.existsSync(dir) ? fs.readdirSync(dir) : [];
              body = `## LHCI scores — manifest missing\n\n`
                + `Expected at \`${manifestPath}\`. Files in \`${dir}\`:\n\n`
                + '```\n' + (files.join('\n') || '(empty)') + '\n```';
            }

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
