version: 2

# Weekly dependency PRs grouped per ecosystem so we can review in batches
# instead of drowning in 20 one-line PRs.

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    groups:
      worker-runtime:
        patterns:
          - "esbuild"
          - "wrangler"
          - "@cloudflare/*"
      worker-test:
        patterns:
          - "vitest"
          - "@vitest/*"
      zod:
        patterns:
          - "zod"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "worker"

  - package-ecosystem: "npm"
    directory: "/site"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      markdown:
        patterns:
          - "marked"
          - "dompurify"
          - "isomorphic-dompurify"
    commit-message:
      prefix: "deps(site)"
    labels:
      - "dependencies"
      - "site"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/London"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "ci"
